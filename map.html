<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024, initial-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Blossom & Koi Garden — Map</title>
  <link rel="stylesheet" href="css/map.css" />
  <link rel="stylesheet" href="css/card.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+Thai:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Preloader — inlined so it's ready before external CSS ── */
    #preloader {
      position: fixed; inset: 0; z-index: 9999;
      background: #1a0e00;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      opacity: 1;
      transition: opacity 0.65s ease;
    }
    #preloader.pre-done { opacity: 0; pointer-events: none; }
    .pre-logo {
      width: clamp(220px, 30vw, 480px);
      filter: drop-shadow(0 4px 24px rgba(255,200,80,0.4));
      animation: preFloat 3s ease-in-out infinite;
    }
    .pre-bar-wrap {
      margin-top: 36px;
      width: clamp(220px, 30vw, 480px);
      height: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }
    .pre-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #f7e07a, #c07800);
      border-radius: 999px;
      transition: width 0.25s ease;
    }
    .pre-text {
      margin-top: 14px;
      font-family: Georgia, serif;
      font-size: clamp(13px, 1.4vw, 17px);
      font-weight: bold;
      letter-spacing: 3px;
      color: rgba(255,230,140,0.85);
    }
    @keyframes preFloat {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <!-- ── PRELOADER ── -->
  <div id="preloader">
    <img class="pre-logo" src="assets/images/home/logo.png" alt="Blossom & Koi Garden" />
    <div class="pre-bar-wrap"><div class="pre-bar" id="pre-bar"></div></div>
    <p class="pre-text" id="pre-text">0%</p>
  </div>
  <script src="js/preload.js"></script>

  <div class="game-root">

    <!-- ── FALLING PETALS ── -->
    <div class="petals">
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
      <div class="petal"></div><div class="petal"></div><div class="petal"></div>
    </div>

    <!-- ── BOARD ── -->
    <div class="board-wrap">
      <img class="board-img" src="assets/images/map_game/background_game.png" alt="Game Board" />
      <div id="spaces-container"></div>
      <div id="tokens-container"></div>
    </div>

    <!-- ── LOGO ── -->
    <div class="map-logo">
      <img src="assets/images/home/logo.png" alt="Blossom & Koi Garden" />
    </div>

    <!-- ── LANG TOGGLE ── -->
    <div class="map-lang-toggle">
      <button class="map-lang-btn map-home-btn" onclick="goHome()" title="Back to Home">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:14px;height:14px;vertical-align:middle">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <button id="map-lang-en" class="map-lang-btn" onclick="mapSetLang('en')">EN</button>
      <button id="map-lang-th" class="map-lang-btn" onclick="mapSetLang('th')">TH</button>
    </div>

    <!-- ── FULLSCREEN BUTTON ── -->
    <button class="fullscreen-btn" id="fullscreen-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
      <svg id="fs-expand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
        <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
      </svg>
      <svg id="fs-compress" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/>
        <line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>
      </svg>
    </button>

    <!-- ── SCORE BAR ── -->
    <div class="score-bar" id="score-bar"></div>

    <!-- ── DICE BAR ── -->
    <div class="dice-bar">
      <img class="dice-bar-bg" src="assets/images/map_game/rolldice_bar.png" alt="" />
      <div class="dice-bar-content">
        <span class="player-label" id="current-player-label">PLAYER 1</span>
        <div class="dice-face-wrap">
          <img class="dice-face" id="dice-face"
               src="assets/images/map_game/1dice.png" alt="Dice" />
        </div>
        <button class="roll-btn" id="roll-btn" onclick="rollDice()">
          <img src="assets/images/map_game/rolldice_button.png" alt="Roll Dice" />
        </button>
      </div>
    </div>

  </div>

  <!-- ── CARD OVERLAY (injected by gameplay.js) ── -->
  <div id="card-overlay"></div>

  <!-- Scripts — load order is critical:
       1. cards.js    → card data arrays (ACTIVITY_CARDS etc.)
       2. map.js      → board state (SPACES, positions, scores etc.)
       3. gameplay.js → uses functions & data from both above files
  -->
  <script src="js/cards.js"></script>
  <script src="js/map.js"></script>
  <script src="js/gameplay.js"></script>
  <script>
    function toggleFullscreen() {
      const el = document.documentElement;
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document);
      }
    }
    function _updateFsIcon() {
      const full = !!(document.fullscreenElement || document.webkitFullscreenElement);
      document.getElementById('fs-expand').style.display   = full ? 'none'  : 'block';
      document.getElementById('fs-compress').style.display = full ? 'block' : 'none';
    }
    document.addEventListener('fullscreenchange',       _updateFsIcon);
    document.addEventListener('webkitfullscreenchange', _updateFsIcon);
  </script>

</body>
</html>
